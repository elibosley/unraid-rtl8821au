name: build-rtw88

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: "Kernel release (uname -r) to build rtw88 modules for"
        required: true
        default: "6.18.33-Unraid"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential bc bison flex libelf-dev libssl-dev kmod \
            xz-utils ca-certificates git curl
      - name: Build rtw88 modules
        env:
          KVER: ${{ github.event.inputs.kernel_version }}
          REPO: ${{ github.workspace }}
          OUT: ${{ github.workspace }}/out-rtw88
        run: bash source/compile-rtw88.sh
      - name: Upload modules artifact
        uses: actions/upload-artifact@v4
        with:
          name: rtw88-${{ github.event.inputs.kernel_version }}
          path: out-rtw88/*.ko
          if-no-files-found: error
